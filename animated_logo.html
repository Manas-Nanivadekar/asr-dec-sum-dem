<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAP Logo Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .logo-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            position: relative;
        }

        /* Subtle glowing aura behind the logo */
        .logo-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background: radial-gradient(circle, rgba(91, 192, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
            pointer-events: none;
            border-radius: 50%;
            animation: pulse-aura 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-aura {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        .leap-text {
            fill: url(#text-gradient);
            filter: drop-shadow(0px 8px 16px rgba(18, 59, 94, 0.15));
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        svg:hover .leap-text {
            filter: drop-shadow(0px 12px 24px rgba(29, 92, 150, 0.25));
        }

        .node-line {
            stroke: url(#line-gradient);
            stroke-width: 1.5;
            stroke-linecap: round;
            opacity: 0.6;
            transition: opacity 0.5s ease, stroke-width 0.3s ease;
        }

        svg:hover .node-line {
            opacity: 0.9;
            stroke-width: 2;
        }

        .node-circle {
            fill: #5bc0ff;
            stroke: #ffffff;
            stroke-width: 2;
            filter: drop-shadow(0 0 10px rgba(91, 192, 255, 0.7));
            transition: stroke-width 0.3s ease, filter 0.3s ease, fill 0.3s ease;
            cursor: pointer;
        }

        .node-circle:hover {
            fill: #8cd3ff;
            stroke-width: 3;
            filter: drop-shadow(0 0 16px rgba(91, 192, 255, 1));
        }
    </style>
</head>

<body>

    <div class="logo-container">
        <svg id="leap-svg" viewBox="0 0 340 180" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Premium gradient for the LEAP text -->
                <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2b7ec9" />
                    <stop offset="50%" stop-color="#1d5c96" />
                    <stop offset="100%" stop-color="#11365c" />
                </linearGradient>

                <!-- Dynamic looking gradient for the lines -->
                <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(91, 192, 255, 0.3)" />
                    <stop offset="50%" stop-color="rgba(91, 192, 255, 1)" />
                    <stop offset="100%" stop-color="rgba(91, 192, 255, 0.3)" />
                </linearGradient>
            </defs>

            <g id="lines-group"></g>

            <!-- L -->
            <path class="leap-text" d="M 80,70 v 50 h 35 v -10 h -25 v -40 z" />
            <!-- E -->
            <path class="leap-text" d="M 130,70 h 35 v 10 h -25 v 10 h 20 v 10 h -20 v 10 h 25 v 10 h -35 z" />
            <!-- A -->
            <path class="leap-text" d="M 180,120 L 195,70 L 205,70 L 220,120 L 208,120 L 200,90 L 192,120 Z" />
            <!-- P -->
            <path class="leap-text" fill-rule="evenodd"
                d="M 235,70 h 20 a 15,15 0 0 1 15,15 a 15,15 0 0 1 -15,15 h -10 v 20 h -10 Z M 245,80 h 10 a 5,5 0 0 1 5,5 a 5,5 0 0 1 -5,5 h -10 Z" />

            <g id="nodes-group"></g>
        </svg>
    </div>

    <script>
        // Use more organic parameters for movement
        const nodes = [
            {
                id: 0, baseX: 55, baseY: 85, baseR: 8, r: 8, x: 55, y: 85, vx: 0, vy: 0,
                freq1: 0.0012, freq2: 0.0017, rangeX: 10, rangeY: 14, phase: 0
            },
            {
                id: 1, baseX: 122, baseY: 50, baseR: 4.5, r: 4.5, x: 122, y: 50, vx: 0, vy: 0,
                freq1: 0.0015, freq2: 0.0011, rangeX: 8, rangeY: 10, phase: 2.5
            },
            {
                id: 2, baseX: 165, baseY: 135, baseR: 7, r: 7, x: 165, y: 135, vx: 0, vy: 0,
                freq1: 0.0011, freq2: 0.0019, rangeX: 12, rangeY: 12, phase: 4.1
            },
            {
                id: 3, baseX: 220, baseY: 55, baseR: 3.5, r: 3.5, x: 220, y: 55, vx: 0, vy: 0,
                freq1: 0.0018, freq2: 0.0013, rangeX: 9, rangeY: 11, phase: 1.8
            },
            {
                id: 4, baseX: 285, baseY: 110, baseR: 7.5, r: 7.5, x: 285, y: 110, vx: 0, vy: 0,
                freq1: 0.0009, freq2: 0.0014, rangeX: 14, rangeY: 8, phase: 5.3
            }
        ];

        const connections = [
            [0, 1], [1, 2], [2, 3], [3, 4]
        ];

        const linesGroup = document.getElementById('lines-group');
        const nodesGroup = document.getElementById('nodes-group');
        const svgElement = document.getElementById('leap-svg');

        const lineElements = [];
        connections.forEach(([n1, n2]) => {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("class", "node-line");
            linesGroup.appendChild(line);
            lineElements.push({ line, n1, n2 });
        });

        const circleElements = [];
        nodes.forEach(node => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("class", "node-circle");
            circle.setAttribute("r", node.r);
            nodesGroup.appendChild(circle);
            circleElements.push({ circle, node });
        });

        let mouseX = -1000;
        let mouseY = -1000;
        let isHovered = false;

        svgElement.addEventListener('mousemove', (e) => {
            const rect = svgElement.getBoundingClientRect();
            mouseX = ((e.clientX - rect.left) / rect.width) * 340;
            mouseY = ((e.clientY - rect.top) / rect.height) * 180;
            isHovered = true;
        });

        svgElement.addEventListener('mouseleave', () => {
            isHovered = false;
        });

        let prevTime = performance.now();

        function animate(currentTime) {
            // Delta time for smooth physics regardless of frame rate
            const dt = Math.min((currentTime - prevTime) / 16.66, 3);
            prevTime = currentTime;

            nodes.forEach(node => {
                // Organic Lissajous figure motion combining multiple sine waves
                const targetX = node.baseX
                    + Math.sin(currentTime * node.freq1 + node.phase) * node.rangeX
                    + Math.cos(currentTime * node.freq2 * 0.7) * (node.rangeX * 0.4);

                const targetY = node.baseY
                    + Math.cos(currentTime * node.freq2 + node.phase) * node.rangeY
                    + Math.sin(currentTime * node.freq1 * 1.3) * (node.rangeY * 0.4);

                // Spring force pulling back to target
                let forceX = (targetX - node.x) * 0.04;
                let forceY = (targetY - node.y) * 0.04;

                // Physics-based magnetic repel effect when hovered
                if (isHovered) {
                    const dx = node.x - mouseX;
                    const dy = node.y - mouseY;
                    const distSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(distSq);

                    const repelRadius = 70;
                    if (dist < repelRadius && dist > 0) {
                        // Exponential repulsion mapping: strong close up, falls off smoothly
                        const repelStrength = Math.pow((repelRadius - dist) / repelRadius, 2) * 1.5;
                        forceX += (dx / dist) * repelStrength;
                        forceY += (dy / dist) * repelStrength;

                        // Bubble expands slightly as if repulsed by energy
                        node.r += (node.baseR * 1.4 - node.r) * 0.1 * dt;
                    } else {
                        node.r += (node.baseR - node.r) * 0.05 * dt;
                    }
                } else {
                    node.r += (node.baseR - node.r) * 0.05 * dt;
                }

                // Apply forces to velocity (with friction/damping)
                node.vx += forceX * dt;
                node.vy += forceY * dt;
                node.vx *= 0.88; // Friction
                node.vy *= 0.88; // Friction

                // Apply velocity to position
                node.x += node.vx * dt;
                node.y += node.vy * dt;

                // Add an ambient breathing/pulsing effect to the bubble radius overall
                const pulse = Math.sin(currentTime * 0.002 + node.phase) * 0.6;
                const finalR = node.r + pulse;

                // Update DOM elements for the circle
                const circleEntry = circleElements.find(c => c.node.id === node.id);
                circleEntry.circle.setAttribute("cx", node.x);
                circleEntry.circle.setAttribute("cy", node.y);
                circleEntry.circle.setAttribute("r", Math.max(0.1, finalR));
            });

            // Update DOM elements for the connecting lines
            lineElements.forEach(({ line, n1, n2 }) => {
                line.setAttribute("x1", nodes[n1].x);
                line.setAttribute("y1", nodes[n1].y);
                line.setAttribute("x2", nodes[n2].x);
                line.setAttribute("y2", nodes[n2].y);

                /* Adjust line opacity based on the distance between dots */
                const dx = nodes[n1].x - nodes[n2].x;
                const dy = nodes[n1].y - nodes[n2].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                const baseOpacity = isHovered ? 0.9 : 0.6;
                // Fade out slightly if stretching significantly beyond average
                const distanceRatio = Math.min(1, 100 / Math.max(10, dist));
                line.style.opacity = baseOpacity * (0.5 + 0.5 * distanceRatio);
            });

            requestAnimationFrame(animate);
        }

        // Start loop
        requestAnimationFrame(animate);
    </script>
</body>

</html>
